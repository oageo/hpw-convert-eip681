name: Release

on:
  release:
    types: [published]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish-crate:
    name: Publish core crate to crates.io
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Verify version matches release tag
        run: |
          CRATE_VERSION=$(cargo metadata --no-deps --format-version=1 \
            | jq -r '.packages[] | select(.name=="hpw-convert-eip681") | .version')
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if [ "$CRATE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::version mismatch: Cargo.toml has $CRATE_VERSION, tag is $TAG_VERSION"
            exit 1
          fi
          echo "Version verified: $CRATE_VERSION"

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Authenticate with crates.io (Trusted Publishing / OIDC)
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish to crates.io
        run: cargo publish -p hpw-convert-eip681
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  publish-npm:
    name: Publish wasm package to npm
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Test
        run: cargo test --workspace

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'latest'

      - name: Build nodejs target and run smoke test
        run: |
          wasm-pack build wasm --target nodejs --out-dir pkg-node --out-name hpw_convert_eip681
          node wasm/tests/smoke.mjs

      - name: Build bundler target for npm
        run: wasm-pack build wasm --target bundler --out-dir pkg --out-name hpw_convert_eip681

      - name: Finalize package.json (rename + license)
        run: node scripts/finalize-package.mjs
        working-directory: wasm

      - name: Verify version matches release tag
        run: |
          PACKAGE_VERSION=$(node -p "require('./wasm/pkg/package.json').version")
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::version mismatch between wasm/pkg/package.json and tag"
            exit 1
          fi
          echo "Version verified: $PACKAGE_VERSION"

      - name: Publish to npm
        run: npm publish ./wasm/pkg --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
